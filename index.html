





<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css " style="background-image:url('school.jpg') ;" rel="stylesheet">
</head>

<body class="container mt-4" style="background-color: bisque;">

<h1 class="mb-4" align="center">Student details </h1>

<form method="POST" class="mb-3 d-flex">
    <input name="search" class="form-control me-2" placeholder="Search" >
    <button class="btn btn-primary">Search</button/n>
    
</form>


<a href="/add" class="btn btn-success mb-3" style="font-weight: bold;">Add Student</a>
<a href="/" class="btn btn-secondary mb-3" style="font-weight: bold;">Back HomePage</a>

{% for student in students.items %}
    <div class="card mb-3 p-3">
        <h4>Name:{{ student.name }}</h4>
        <p>Age: {{ student.age }}</p>
        <p>Course: {{ student.course }}</p>

        <a href="/edit/{{ student.id }}" class="btn btn-warning btn-sm" width="Edit">Edit</a>
        <a href="/delete/{{ student.id }}" class="btn btn-danger btn-sm" width="Delete">Delete</a>  
    </div>
{% endfor %}

{% if students.has_prev %}
    <a href="?page={{ students.prev_num }}&search={{ search }}" class="btn btn-secondary" style="background-color: rgb(4, 245, 124); border-color: rgb(237, 230, 232);">Previous</a>
{% endif %}

{% if students.has_next %}
    <a href="?page={{ students.next_num }}&search={{ search }}" class="btn btn-secondary" style="background-color: rgb(6, 134, 231); border-color: #f9f2f2;">Next</a>
{% endif %}
</body>
</html>
